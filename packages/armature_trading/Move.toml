[package]
name = "armature_trading"
edition = "2024"
version = "0.0.1"

# armature_trading wires the DAO TreasuryVault to the TriexBook DEX so that
# deposit / order / sweep operations execute through the unified
# ExecutionTicket<P> proposal pipeline. Standalone, optional package: consumers
# who do not need DEX integration never pull triexbook.
[dependencies]
armature  = { git = "https://github.com/loash-industries/armature.git",    subdir = "packages/armature_framework", rev = "4bd6fbaea43fab3967b0c1627b1bea679abc78c3" }
triexbook = { git = "https://github.com/loash-industries/triex-book.git",   subdir = "packages/triexbook",          rev = "7630922672b50a1596d354c93e20208191520c22" }
# override = true: armature_trading and armature both depend on multicoin;
# we override to unify on c7a97f2 (same rev as triexbook) so
# TreasuryVault's MultiCoinBalance and triexbook's are the identical type.
multicoin = { git = "https://github.com/Algorithmic-Warfare/multicoin",     subdir = "packages/multicoin",          rev = "c7a97f2f42ffbddbe2d44686cbc9eebd1810b8d6", override = true }

[environments]
testnet_wip = "4c78adac"
