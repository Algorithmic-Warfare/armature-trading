[package]
name = "armature_trading"
edition = "2024"
version = "0.0.1"

# armature_trading wires the DAO TreasuryVault to the TriexBook DEX so that
# deposit / order / sweep operations execute through the unified
# ExecutionTicket<P> proposal pipeline. Standalone, optional package: consumers
# who do not need DEX integration never pull triexbook.
#
# Target environment: testnet_stillness ONLY.
#   On testnet_stillness, armature_framework, triexbook, and multicoin all
#   resolve to the SAME multicoin build (rev c7a97f2, matching manifest digests),
#   so TreasuryVault's MultiCoinBalance and triexbook's are the identical type.
#   Do NOT add testnet_utopia: triexbook pins a different multicoin there
#   (281bd7d), which would diverge the MultiCoinBalance type and break the
#   treasury <-> balance_manager handoff.

# BLOCKER: armature_framework on `main` declares only `testnet_wip`, NOT
# `testnet_stillness`. Move's automated address management requires every
# transitive dep to declare the build env, so `sui move build -e testnet_stillness`
# fails to resolve `armature` until the framework adds a `testnet_stillness`
# entry to its [environments]. This package's own source compiles cleanly once
# that override lands (verified locally against a patched framework copy).
[dependencies]
armature  = { git = "https://github.com/loash-industries/armature.git",    subdir = "packages/armature_framework", rev = "main" }
triexbook = { git = "https://github.com/loash-industries/triex-book.git",   subdir = "packages/triexbook",          rev = "7630922672b50a1596d354c93e20208191520c22" }
# token is a transitive dep of triexbook (the CRED coin). Declared here explicitly
# so tests can import token::cred::CRED to mint pool-creation fee coins.
token = { git = "https://github.com/loash-industries/triex-book.git",   subdir = "packages/token",          rev = "7630922672b50a1596d354c93e20208191520c22" }
# override = true: armature_trading, armature, and triexbook all depend on multicoin at
# the SAME rev (c7a97f2) -> same on-chain package id. Move requires an explicit override
# to confirm the versions are intentionally unified (they are).
#
# IMPORTANT: the URL must NOT end in ".git". armature uses the no-.git form and Move
# treats "multicoin" and "multicoin.git" as distinct package identities, breaking type
# compatibility. triexbook's local Move.toml has been updated to match (no ".git").
# When promoting triexbook back to a pinned git dep, ensure the committed Move.toml also
# uses the no-.git URL, then update the rev here accordingly.
multicoin = { git = "https://github.com/Algorithmic-Warfare/multicoin",     subdir = "packages/multicoin",          rev = "c7a97f2f42ffbddbe2d44686cbc9eebd1810b8d6", override = true }

# Published address on testnet_stillness. 0x0 until first publish; replace with
# the real package id after `sui client publish -e testnet_stillness`.
[environments]
testnet_stillness = "0x0"
