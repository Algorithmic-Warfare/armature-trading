[package]
name = "armature_trading"
edition = "2024"
version = "0.0.1"

# armature_trading wires the DAO TreasuryVault to the TriexBook DEX so that
# deposit / order / sweep operations execute through the unified
# ExecutionTicket<P> proposal pipeline. Standalone, optional package: consumers
# who do not need DEX integration never pull triexbook.
#
# Target environment: testnet_wip.

[dependencies]
armature  = { git = "https://github.com/loash-industries/armature.git",       subdir = "packages/armature_framework", rev = "2d799787a73f200b929f85e20c16598863789aa7" }
triexbook = { git = "https://github.com/loash-industries/triex-book.git",      subdir = "packages/triexbook",          rev = "afe48366eb3c60c9f924b0bcd51376bdf67c5648" }
token     = { git = "https://github.com/loash-industries/triex-book.git",      subdir = "packages/token",              rev = "afe48366eb3c60c9f924b0bcd51376bdf67c5648" }
# override = true: armature and triexbook both pull multicoin; this unifies them on
# a single entry so there is no multicoin_1 duplicate in the lock.
multicoin = { git = "https://github.com/Algorithmic-Warfare/multicoin", subdir = "packages/multicoin", rev = "330d339336f2b62ae216fb7398dbbf165bdb3c3f", override = true }

[environments]
testnet_wip = "0x9544cc68cd446f1ed2a4cf5ea858be049c3db827c73efffc8d6347845d5a2fb7"
